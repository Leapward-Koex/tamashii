name: Build Android APK

permissions:
  contents: write

env:
  DEFAULT_FLUTTER_VERSION: '3.38.3'
  ANDROID_VERSION_CODE_BASE_EPOCH: '1704067200'

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      flutter_version:
        description: 'Flutter version to use'
        required: false
        default: '3.38.3'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # Fetch full history for Git LFS and submodules
        fetch-depth: 0
        lfs: true

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ github.event.inputs.flutter_version || env.DEFAULT_FLUTTER_VERSION }}
        channel: 'stable'
        cache: true

    - name: Install dependencies
      run: flutter pub get

    # - name: Analyze code
    #   run: flutter analyze

    # - name: Run tests
    #   run: flutter test

    - name: Validate Android signing secrets
      if: github.event_name != 'pull_request'
      shell: bash
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      run: |
        for secret_name in \
          ANDROID_KEYSTORE_BASE64 \
          ANDROID_KEYSTORE_PASSWORD \
          ANDROID_KEY_ALIAS \
          ANDROID_KEY_PASSWORD; do
          if [ -z "${!secret_name}" ]; then
            echo "::error::$secret_name is not set"
            exit 1
          fi
        done

    - name: Compute Android version code
      id: version
      if: github.event_name != 'pull_request'
      shell: bash
      run: |
        now_utc_seconds=$(date -u +%s)
        build_number=$((now_utc_seconds - ANDROID_VERSION_CODE_BASE_EPOCH))
        echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
        echo "Using Android versionCode=$build_number"

    - name: Restore Android release keystore
      if: github.event_name != 'pull_request'
      shell: bash
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      run: |
        printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks
        cat > android/key.properties <<EOF
        storePassword=${ANDROID_KEYSTORE_PASSWORD}
        keyPassword=${ANDROID_KEY_PASSWORD}
        keyAlias=${ANDROID_KEY_ALIAS}
        storeFile=upload-keystore.jks
        EOF

    - name: Build APK (debug)
      if: github.event_name == 'pull_request'
      run: flutter build apk --debug

    - name: Build APK (signed release)
      if: github.event_name != 'pull_request'
      env:
        ANDROID_VERSION_CODE: ${{ steps.version.outputs.build_number }}
      run: flutter build apk --release

    - name: Upload debug APK artifact
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: android-apk-debug
        path: build/app/outputs/flutter-apk/app-debug.apk
        retention-days: 30

    - name: Upload release APK artifact
      if: github.event_name != 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: android-apk-release-${{ steps.version.outputs.build_number }}
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30

    - name: Upload APK to release (on release only)
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: build/app/outputs/flutter-apk/app-release.apk
        asset_name: tamashii-${{ github.event.release.tag_name }}.apk
        asset_content_type: application/vnd.android.package-archive
